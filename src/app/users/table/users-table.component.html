<section class="users-table-card">
  <div class="table-header">
    <mat-form-field appearance="outline" class="table-filter">
      <mat-label>Rechercher</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Rechercher par nom..." #input />
    </mat-form-field>
  </div>

  <div class="table-scroll">
    <table mat-table [dataSource]="dataSource" class="stats-table">
      <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
        <th mat-header-cell *matHeaderCellDef>{{ column | titlecase }}</th>
        <td
          mat-cell
          class="text-reduce"
          *matCellDef="let element"
          (click)="getRoute(element)"
          [innerHTML]="renderColumn(element, column) | sanitizeHtml"
        ></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator #paginator [pageSizeOptions]="[25, 50, 100]" aria-label="Selectionner une page"></mat-paginator>
  <p class="empty-state" *ngIf="this.dataSource.data.length === 0">Aucun resultat</p>
</section>
