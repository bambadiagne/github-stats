<div class="app-shell">
  <mat-toolbar class="topbar">
    <button mat-icon-button class="menu-btn" (click)="sidenav.toggle()" aria-label="Ouvrir la navigation">
      <mat-icon>menu</mat-icon>
    </button>

    <a class="brand" [routerLink]="'/users/senegal'">
      <span class="brand-mark">GH</span>
      <span class="brand-text">GitHub Stats</span>
    </a>

    <span class="menu-spacer"></span>

    <nav class="topbar-nav d-none d-lg-flex" aria-label="Navigation principale">
      <a mat-button class="top-link" [routerLink]="'/users/senegal'" routerLinkActive="top-link-active">Senegal</a>
      <a
        mat-button
        class="top-link"
        [routerLink]="'/users'"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="top-link-active"
        >Global</a
      >
    </nav>
  </mat-toolbar>

  <mat-sidenav-container class="app-container">
    <mat-sidenav #sidenav mode="over" class="app-sidenav">
      <div class="sidenav-header">
        <p class="mb-0">Navigation</p>
      </div>
      <mat-nav-list>
        <a mat-list-item [routerLink]="'/users/senegal'" (click)="sidenav.close()">Senegal contributions</a>
        <a mat-list-item [routerLink]="'/users'" (click)="sidenav.close()">World Wide</a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="app-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
